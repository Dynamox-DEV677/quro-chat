<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920" />
<title>Quro Stocks Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #09090b;
    color: #f0f0f2;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    width: 1080px;
    height: 1920px;
    padding: 48px 40px 40px;
    display: flex;
    flex-direction: column;
    gap: 36px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(56,161,105,0.12);
    padding: 5px 14px 5px 10px;
    border-radius: 20px;
  }
  .live-dot {
    width: 8px; height: 8px;
    background: #38a169;
    border-radius: 50%;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(56,161,105,0.5); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(56,161,105,0); }
  }
  .live-text {
    font-size: 12px;
    font-weight: 700;
    color: #38a169;
    letter-spacing: 1.2px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .icon-btn {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: #111113;
    border: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .icon-btn svg { width: 20px; height: 20px; stroke: #888; stroke-width: 2; fill: none; }

  /* ── Index Cards ── */
  .index-row {
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }
  .index-card {
    flex: 1;
    background: #111113;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    padding: 22px 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .index-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 18px 18px 0 0;
  }
  .index-card.up::before { background: linear-gradient(90deg, #38a169, rgba(56,161,105,0.2)); }
  .index-card.down::before { background: linear-gradient(90deg, #e05050, rgba(224,80,80,0.2)); }
  .index-name {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    letter-spacing: 0.5px;
  }
  .index-price {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .index-change {
    font-size: 14px;
    font-weight: 600;
  }
  .index-change.up { color: #38a169; }
  .index-change.down { color: #e05050; }
  .index-sparkline { margin-top: auto; }
  .index-sparkline svg { width: 100%; height: 40px; }

  /* ── Filters ── */
  .filters {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .filter-tab {
    padding: 10px 28px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    background: #111113;
    border: 1px solid rgba(255,255,255,0.06);
    color: #666;
    cursor: pointer;
    position: relative;
  }
  .filter-tab.active {
    color: #38a169;
    background: rgba(56,161,105,0.08);
    border-color: rgba(56,161,105,0.2);
  }
  .filter-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 20%; right: 20%;
    height: 2px;
    background: #38a169;
    border-radius: 2px;
  }

  /* ── Stock Grid ── */
  .stock-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    flex: 1;
    min-height: 0;
  }
  .stock-card {
    background: #111113;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 20px 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    border-left: 3px solid transparent;
  }
  .stock-card.up { border-left-color: #38a169; }
  .stock-card.down { border-left-color: #e05050; }

  .stock-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .stock-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .stock-info { flex: 1; min-width: 0; }
  .stock-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }
  .stock-sector {
    font-size: 11px;
    color: #555;
    margin-top: 2px;
  }
  .stock-price-block { text-align: right; }
  .stock-price {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .stock-change {
    font-size: 12px;
    font-weight: 600;
    margin-top: 2px;
  }
  .stock-change.up { color: #38a169; }
  .stock-change.down { color: #e05050; }
  .stock-sparkline { margin-top: auto; }
  .stock-sparkline svg { width: 100%; height: 32px; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="header-title">Markets</span>
      <div class="live-badge">
        <span class="live-dot"></span>
        <span class="live-text">LIVE</span>
      </div>
    </div>
    <div class="header-right">
      <div class="icon-btn">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      </div>
      <div class="icon-btn">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
  </div>

  <!-- Index Cards -->
  <div class="index-row">
    <!-- NIFTY 50 -->
    <div class="index-card up">
      <span class="index-name">NIFTY 50</span>
      <span class="index-price">&#8377;24,680.50</span>
      <span class="index-change up">&#9650; +0.82%</span>
      <div class="index-sparkline">
        <svg viewBox="0 0 200 40" preserveAspectRatio="none">
          <defs><linearGradient id="gUp1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#38a169" stop-opacity="0.25"/><stop offset="100%" stop-color="#38a169" stop-opacity="0"/></linearGradient></defs>
          <polyline points="0,32 20,30 40,28 60,26 80,30 100,22 120,20 140,18 160,14 180,10 200,6" fill="none" stroke="#38a169" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polygon points="0,32 20,30 40,28 60,26 80,30 100,22 120,20 140,18 160,14 180,10 200,6 200,40 0,40" fill="url(#gUp1)"/>
        </svg>
      </div>
    </div>
    <!-- SENSEX -->
    <div class="index-card up">
      <span class="index-name">SENSEX</span>
      <span class="index-price">&#8377;81,245.30</span>
      <span class="index-change up">&#9650; +0.75%</span>
      <div class="index-sparkline">
        <svg viewBox="0 0 200 40" preserveAspectRatio="none">
          <defs><linearGradient id="gUp2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#38a169" stop-opacity="0.25"/><stop offset="100%" stop-color="#38a169" stop-opacity="0"/></linearGradient></defs>
          <polyline points="0,34 25,30 50,32 75,26 100,24 125,22 150,16 175,12 200,8" fill="none" stroke="#38a169" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polygon points="0,34 25,30 50,32 75,26 100,24 125,22 150,16 175,12 200,8 200,40 0,40" fill="url(#gUp2)"/>
        </svg>
      </div>
    </div>
    <!-- BANK NIFTY -->
    <div class="index-card down">
      <span class="index-name">BANK NIFTY</span>
      <span class="index-price">&#8377;52,130.80</span>
      <span class="index-change down">&#9660; -0.34%</span>
      <div class="index-sparkline">
        <svg viewBox="0 0 200 40" preserveAspectRatio="none">
          <defs><linearGradient id="gDn1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e05050" stop-opacity="0.25"/><stop offset="100%" stop-color="#e05050" stop-opacity="0"/></linearGradient></defs>
          <polyline points="0,10 25,14 50,12 75,18 100,20 125,24 150,28 175,26 200,32" fill="none" stroke="#e05050" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polygon points="0,10 25,14 50,12 75,18 100,20 125,24 150,28 175,26 200,32 200,40 0,40" fill="url(#gDn1)"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="filters">
    <div class="filter-tab">All</div>
    <div class="filter-tab active">Gains</div>
    <div class="filter-tab">Losses</div>
  </div>

  <!-- Stock Grid -->
  <div class="stock-grid" id="stockGrid"></div>

</div>

<script>
const stocks = [
  { name: "RELIANCE",  sector: "Oil & Gas",      price: "2,945.60", change: "+1.2%", dir: "up",   color: "#6366f1" },
  { name: "TCS",       sector: "IT Services",    price: "4,125.30", change: "+0.8%", dir: "up",   color: "#0ea5e9" },
  { name: "INFY",      sector: "IT Services",    price: "1,890.45", change: "+2.1%", dir: "up",   color: "#8b5cf6" },
  { name: "HDFCBANK",  sector: "Banking",        price: "1,652.80", change: "+0.5%", dir: "up",   color: "#f59e0b" },
  { name: "ICICIBANK", sector: "Banking",        price: "1,298.70", change: "+1.8%", dir: "up",   color: "#ec4899" },
  { name: "SBIN",      sector: "Banking",        price: "825.40",   change: "+0.3%", dir: "up",   color: "#14b8a6" },
  { name: "ITC",       sector: "FMCG",           price: "478.90",   change: "+0.9%", dir: "up",   color: "#f97316" },
  { name: "WIPRO",     sector: "IT Services",    price: "562.15",   change: "+1.5%", dir: "up",   color: "#a855f7" },
];

// Generate varied ascending sparklines
function makeSparkline(seed) {
  const pts = [];
  let y = 28 + (seed % 5) * 2;
  for (let x = 0; x <= 200; x += 25) {
    y -= (1 + Math.abs(Math.sin(seed + x * 0.3)) * 4);
    y = Math.max(4, Math.min(36, y));
    pts.push(`${x},${y.toFixed(0)}`);
  }
  const last = pts[pts.length - 1];
  const gradId = `sg${seed}`;
  return `<svg viewBox="0 0 200 32" preserveAspectRatio="none">
    <defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38a169" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#38a169" stop-opacity="0"/>
    </linearGradient></defs>
    <polyline points="${pts.join(' ')}" fill="none" stroke="#38a169" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="${pts.join(' ')} 200,32 0,32" fill="url(#${gradId})"/>
  </svg>`;
}

const grid = document.getElementById('stockGrid');
stocks.forEach((s, i) => {
  const initials = s.name.slice(0, 2);
  const arrow = s.dir === 'up' ? '&#9650;' : '&#9660;';
  grid.innerHTML += `
    <div class="stock-card ${s.dir}">
      <div class="stock-top">
        <div class="stock-icon" style="background:${s.color}">${initials}</div>
        <div class="stock-info">
          <div class="stock-name">${s.name}</div>
          <div class="stock-sector">${s.sector}</div>
        </div>
        <div class="stock-price-block">
          <div class="stock-price">&#8377;${s.price}</div>
          <div class="stock-change ${s.dir}">${arrow} ${s.change}</div>
        </div>
      </div>
      <div class="stock-sparkline">${makeSparkline(i * 7 + 3)}</div>
    </div>`;
});
</script>
</body>
</html>
