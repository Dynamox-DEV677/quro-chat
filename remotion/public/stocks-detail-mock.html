<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920" />
<title>Quro — Stock Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #09090b;
    color: #f0f0f2;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
    padding: 48px 48px 40px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 8px;
  }
  .back-arrow {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: #111113;
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    flex-shrink: 0;
  }
  .back-arrow svg { width: 22px; height: 22px; stroke: #f0f0f2; }
  .header-title { font-size: 38px; font-weight: 700; letter-spacing: 1.2px; }
  .nse-badge {
    margin-left: auto;
    font-size: 18px;
    font-weight: 600;
    color: #38a169;
    border: 1.5px solid #38a169;
    border-radius: 20px;
    padding: 4px 18px;
    letter-spacing: 0.6px;
  }

  .sector-label {
    font-size: 22px;
    color: rgba(240,240,242,0.4);
    margin-left: 64px;
    margin-bottom: 32px;
    font-weight: 500;
  }

  /* ── Price area ── */
  .price-area { margin-bottom: 28px; }
  .price-main {
    font-size: 54px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .price-change {
    font-size: 24px;
    font-weight: 600;
    color: #38a169;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .price-change .arrow { font-size: 18px; }

  /* ── Chart ── */
  .chart-container {
    flex: 0 0 auto;
    height: 680px;
    background: #111113;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
    padding: 24px 16px 16px;
  }
  .chart-container svg { width: 100%; height: 100%; }

  /* ── Selector rows ── */
  .selector-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .selector-btn {
    flex: 1;
    text-align: center;
    padding: 14px 0;
    border-radius: 12px;
    font-size: 22px;
    font-weight: 600;
    background: #111113;
    border: 1px solid rgba(255,255,255,0.06);
    color: rgba(240,240,242,0.5);
    cursor: pointer;
    transition: all 0.15s;
  }
  .selector-btn.active {
    background: #38a169;
    color: #fff;
    border-color: #38a169;
  }

  /* ── Stats grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: #111113;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 22px 24px;
  }
  .stat-label {
    font-size: 18px;
    font-weight: 500;
    color: rgba(240,240,242,0.4);
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 700;
  }
  .stat-value.green { color: #38a169; }
  .stat-value.red { color: #e05050; }

  /* ── OHLC row ── */
  .ohlc-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 32px;
  }
  .ohlc-card {
    background: #111113;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 18px 16px;
    text-align: center;
  }
  .ohlc-label {
    font-size: 16px;
    font-weight: 500;
    color: rgba(240,240,242,0.35);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .ohlc-value {
    font-size: 22px;
    font-weight: 700;
  }

  /* ── Trade button ── */
  .trade-btn {
    margin-top: auto;
    width: 100%;
    padding: 26px;
    border-radius: 18px;
    background: linear-gradient(135deg, #38a169 0%, #2f8a5a 100%);
    border: none;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.8px;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(56,161,105,0.25);
  }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="back-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </div>
    <span class="header-title">RELIANCE</span>
    <span class="nse-badge">NSE</span>
  </div>
  <div class="sector-label">Energy</div>

  <!-- Price -->
  <div class="price-area">
    <div class="price-main">&#8377;2,945.60</div>
    <div class="price-change">
      <span class="arrow">&#9650;</span> +&#8377;34.80 (+1.20%)
    </div>
  </div>

  <!-- Candlestick Chart -->
  <div class="chart-container">
    <svg viewBox="0 0 960 620" preserveAspectRatio="none">
      <defs>
        <linearGradient id="volGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#38a169" stop-opacity="0.35" />
          <stop offset="100%" stop-color="#38a169" stop-opacity="0.05" />
        </linearGradient>
      </defs>

      <!-- Grid lines -->
      <line x1="0" y1="80" x2="960" y2="80" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <line x1="0" y1="160" x2="960" y2="160" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <line x1="0" y1="240" x2="960" y2="240" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <line x1="0" y1="320" x2="960" y2="320" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <line x1="0" y1="400" x2="960" y2="400" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

      <!-- Candles: x positions every 46px starting at 30, body width 20 -->
      <!-- Candle format: wick line + body rect -->
      <!-- Green = bullish (close > open, body top=close), Red = bearish -->

      <!-- Candle 1 - green -->
      <line x1="52" y1="310" x2="52" y2="390" stroke="#38a169" stroke-width="2"/>
      <rect x="42" y="340" width="20" height="40" rx="2" fill="#38a169"/>

      <!-- Candle 2 - green -->
      <line x1="98" y1="300" x2="98" y2="380" stroke="#38a169" stroke-width="2"/>
      <rect x="88" y="320" width="20" height="45" rx="2" fill="#38a169"/>

      <!-- Candle 3 - red -->
      <line x1="144" y1="290" x2="144" y2="375" stroke="#e05050" stroke-width="2"/>
      <rect x="134" y="300" width="20" height="50" rx="2" fill="#e05050"/>

      <!-- Candle 4 - green -->
      <line x1="190" y1="285" x2="190" y2="370" stroke="#38a169" stroke-width="2"/>
      <rect x="180" y="310" width="20" height="40" rx="2" fill="#38a169"/>

      <!-- Candle 5 - green -->
      <line x1="236" y1="270" x2="236" y2="355" stroke="#38a169" stroke-width="2"/>
      <rect x="226" y="290" width="20" height="45" rx="2" fill="#38a169"/>

      <!-- Candle 6 - green -->
      <line x1="282" y1="255" x2="282" y2="340" stroke="#38a169" stroke-width="2"/>
      <rect x="272" y="275" width="20" height="42" rx="2" fill="#38a169"/>

      <!-- Candle 7 - red -->
      <line x1="328" y1="260" x2="328" y2="350" stroke="#e05050" stroke-width="2"/>
      <rect x="318" y="270" width="20" height="55" rx="2" fill="#e05050"/>

      <!-- Candle 8 - green -->
      <line x1="374" y1="250" x2="374" y2="335" stroke="#38a169" stroke-width="2"/>
      <rect x="364" y="265" width="20" height="48" rx="2" fill="#38a169"/>

      <!-- Candle 9 - green -->
      <line x1="420" y1="235" x2="420" y2="310" stroke="#38a169" stroke-width="2"/>
      <rect x="410" y="250" width="20" height="40" rx="2" fill="#38a169"/>

      <!-- Candle 10 - green -->
      <line x1="466" y1="220" x2="466" y2="300" stroke="#38a169" stroke-width="2"/>
      <rect x="456" y="235" width="20" height="44" rx="2" fill="#38a169"/>

      <!-- Candle 11 - red -->
      <line x1="512" y1="225" x2="512" y2="310" stroke="#e05050" stroke-width="2"/>
      <rect x="502" y="235" width="20" height="52" rx="2" fill="#e05050"/>

      <!-- Candle 12 - green -->
      <line x1="558" y1="210" x2="558" y2="295" stroke="#38a169" stroke-width="2"/>
      <rect x="548" y="225" width="20" height="46" rx="2" fill="#38a169"/>

      <!-- Candle 13 - green -->
      <line x1="604" y1="195" x2="604" y2="275" stroke="#38a169" stroke-width="2"/>
      <rect x="594" y="210" width="20" height="42" rx="2" fill="#38a169"/>

      <!-- Candle 14 - red -->
      <line x1="650" y1="200" x2="650" y2="285" stroke="#e05050" stroke-width="2"/>
      <rect x="640" y="210" width="20" height="50" rx="2" fill="#e05050"/>

      <!-- Candle 15 - green -->
      <line x1="696" y1="185" x2="696" y2="265" stroke="#38a169" stroke-width="2"/>
      <rect x="686" y="200" width="20" height="40" rx="2" fill="#38a169"/>

      <!-- Candle 16 - green -->
      <line x1="742" y1="170" x2="742" y2="250" stroke="#38a169" stroke-width="2"/>
      <rect x="732" y="185" width="20" height="42" rx="2" fill="#38a169"/>

      <!-- Candle 17 - green -->
      <line x1="788" y1="155" x2="788" y2="235" stroke="#38a169" stroke-width="2"/>
      <rect x="778" y="168" width="20" height="44" rx="2" fill="#38a169"/>

      <!-- Candle 18 - red -->
      <line x1="834" y1="148" x2="834" y2="230" stroke="#e05050" stroke-width="2"/>
      <rect x="824" y="158" width="20" height="48" rx="2" fill="#e05050"/>

      <!-- Candle 19 - green -->
      <line x1="880" y1="130" x2="880" y2="215" stroke="#38a169" stroke-width="2"/>
      <rect x="870" y="145" width="20" height="44" rx="2" fill="#38a169"/>

      <!-- Candle 20 - green -->
      <line x1="926" y1="115" x2="926" y2="200" stroke="#38a169" stroke-width="2"/>
      <rect x="916" y="130" width="20" height="46" rx="2" fill="#38a169"/>

      <!-- Volume bars -->
      <rect x="42"  y="560" width="20" height="40" rx="2" fill="url(#volGrad)"/>
      <rect x="88"  y="550" width="20" height="50" rx="2" fill="url(#volGrad)"/>
      <rect x="134" y="565" width="20" height="35" rx="2" fill="url(#volGrad)"/>
      <rect x="180" y="555" width="20" height="45" rx="2" fill="url(#volGrad)"/>
      <rect x="226" y="545" width="20" height="55" rx="2" fill="url(#volGrad)"/>
      <rect x="272" y="550" width="20" height="50" rx="2" fill="url(#volGrad)"/>
      <rect x="318" y="570" width="20" height="30" rx="2" fill="url(#volGrad)"/>
      <rect x="364" y="540" width="20" height="60" rx="2" fill="url(#volGrad)"/>
      <rect x="410" y="555" width="20" height="45" rx="2" fill="url(#volGrad)"/>
      <rect x="456" y="535" width="20" height="65" rx="2" fill="url(#volGrad)"/>
      <rect x="502" y="565" width="20" height="35" rx="2" fill="url(#volGrad)"/>
      <rect x="548" y="545" width="20" height="55" rx="2" fill="url(#volGrad)"/>
      <rect x="594" y="530" width="20" height="70" rx="2" fill="url(#volGrad)"/>
      <rect x="640" y="560" width="20" height="40" rx="2" fill="url(#volGrad)"/>
      <rect x="686" y="540" width="20" height="60" rx="2" fill="url(#volGrad)"/>
      <rect x="732" y="525" width="20" height="75" rx="2" fill="url(#volGrad)"/>
      <rect x="778" y="520" width="20" height="80" rx="2" fill="url(#volGrad)"/>
      <rect x="824" y="555" width="20" height="45" rx="2" fill="url(#volGrad)"/>
      <rect x="870" y="530" width="20" height="70" rx="2" fill="url(#volGrad)"/>
      <rect x="916" y="515" width="20" height="85" rx="2" fill="url(#volGrad)"/>
    </svg>
  </div>

  <!-- Range selector -->
  <div class="selector-row">
    <div class="selector-btn">1D</div>
    <div class="selector-btn">5D</div>
    <div class="selector-btn active">1M</div>
    <div class="selector-btn">3M</div>
    <div class="selector-btn">6M</div>
    <div class="selector-btn">1Y</div>
  </div>

  <!-- Interval selector -->
  <div class="selector-row">
    <div class="selector-btn">5m</div>
    <div class="selector-btn active">15m</div>
    <div class="selector-btn">30m</div>
    <div class="selector-btn">1H</div>
  </div>

  <!-- Stats grid -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">High</div>
      <div class="stat-value green">&#8377;2,968.40</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Low</div>
      <div class="stat-value red">&#8377;2,912.15</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Volume</div>
      <div class="stat-value">12.4M</div>
    </div>
  </div>

  <!-- OHLC row -->
  <div class="ohlc-row">
    <div class="ohlc-card">
      <div class="ohlc-label">Open</div>
      <div class="ohlc-value">&#8377;2,910.80</div>
    </div>
    <div class="ohlc-card">
      <div class="ohlc-label">High</div>
      <div class="ohlc-value green" style="color:#38a169">&#8377;2,968.40</div>
    </div>
    <div class="ohlc-card">
      <div class="ohlc-label">Low</div>
      <div class="ohlc-value red" style="color:#e05050">&#8377;2,912.15</div>
    </div>
    <div class="ohlc-card">
      <div class="ohlc-label">Close</div>
      <div class="ohlc-value">&#8377;2,945.60</div>
    </div>
  </div>

  <!-- Trade button -->
  <button class="trade-btn">Trade RELIANCE</button>

</div>
</body>
</html>
