<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quro Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0e0e0e;color:#e0e0e0;min-height:100vh}
a{color:#5865f2;text-decoration:none}
.top-bar{background:#111;border-bottom:1px solid rgba(255,255,255,.06);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.top-bar h1{font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px}
.top-bar h1 span{color:#ffa500}
.top-bar .badge{background:rgba(255,165,0,.15);color:#ffa500;font-size:9px;font-weight:800;padding:3px 8px;border-radius:4px;letter-spacing:.5px}
.top-bar button{background:#1a1a1a;border:1px solid rgba(255,255,255,.08);color:#aaa;padding:8px 16px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .15s}
.top-bar button:hover{background:#222;color:#fff}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:#151515;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:40px 32px;width:100%;max-width:380px;text-align:center}
.login-card h2{font-size:20px;font-weight:800;margin-bottom:6px}
.login-card p{font-size:13px;color:#777;margin-bottom:24px}
.login-card input{width:100%;padding:12px 14px;background:#1a1a1a;border:1px solid rgba(255,255,255,.08);border-radius:6px;color:#e0e0e0;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px;transition:border-color .15s}
.login-card input:focus{border-color:rgba(255,255,255,.2)}
.login-card input::placeholder{color:#555}
.login-card button{width:100%;padding:12px;background:#ffa500;border:none;border-radius:6px;color:#000;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:4px}
.login-card button:hover{background:#e69500}
.login-card .err{color:#f44;font-size:12px;margin-top:8px;min-height:18px}
.container{max-width:1200px;margin:0 auto;padding:20px 24px}
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:10px;overflow-x:auto}
.tab{padding:8px 16px;background:none;border:none;color:#777;font-size:13px;font-weight:600;cursor:pointer;border-radius:6px;transition:all .15s;font-family:inherit;white-space:nowrap}
.tab:hover{color:#ccc;background:rgba(255,255,255,.04)}
.tab.active{color:#fff;background:rgba(255,255,255,.08)}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#151515;border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:16px}
.stat-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#666;margin-bottom:6px}
.stat-val{font-size:28px;font-weight:800;color:#fff}
.stat-sub{font-size:11px;color:#555;margin-top:2px}
.section{margin-bottom:24px}
.section h3{font-size:14px;font-weight:700;color:#999;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section h3 .count{background:rgba(255,255,255,.06);padding:2px 8px;border-radius:10px;font-size:11px;color:#888}
table{width:100%;border-collapse:collapse;background:#151515;border:1px solid rgba(255,255,255,.06);border-radius:8px;overflow:hidden}
th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#555;background:#111;border-bottom:1px solid rgba(255,255,255,.06)}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.user-row{display:flex;align-items:center;gap:10px}
.user-av{width:30px;height:30px;border-radius:50%;background:#222;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden}
.user-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.owner-badge{display:inline-flex;align-items:center;gap:2px;background:rgba(255,165,0,.15);color:#ffa500;font-size:8px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.5px;margin-left:6px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot.on{background:#3da87a}
.status-dot.idle{background:#faa61a}
.status-dot.off{background:#555}
.action-btn{padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.08);background:#1a1a1a;color:#aaa;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s;margin-right:4px}
.action-btn:hover{background:#222;color:#fff}
.action-btn.danger{border-color:rgba(237,66,69,.2);color:rgba(237,66,69,.7)}
.action-btn.danger:hover{background:rgba(237,66,69,.1);color:#ED4245}
.empty{text-align:center;padding:40px;color:#444;font-size:13px}
.search-bar{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid rgba(255,255,255,.06);border-radius:6px;color:#e0e0e0;font-size:13px;font-family:inherit;outline:none;margin-bottom:16px;transition:border-color .15s}
.search-bar:focus{border-color:rgba(255,255,255,.15)}
.search-bar::placeholder{color:#555}
.msg-preview{max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#888}
.edit-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.edit-modal.open{display:flex}
.edit-card{background:#151515;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:24px;width:100%;max-width:400px}
.edit-card h3{font-size:16px;font-weight:700;margin-bottom:16px}
.edit-card label{display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#666;margin-bottom:4px;margin-top:12px}
.edit-card input,.edit-card textarea{width:100%;padding:10px 12px;background:#1a1a1a;border:1px solid rgba(255,255,255,.08);border-radius:6px;color:#e0e0e0;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.edit-card input:focus,.edit-card textarea:focus{border-color:rgba(255,255,255,.2)}
.edit-card textarea{min-height:60px;resize:vertical}
.edit-card .btn-row{display:flex;gap:8px;margin-top:16px}
.edit-card .btn-save{flex:1;padding:10px;background:#ffa500;border:none;border-radius:6px;color:#000;font-weight:700;cursor:pointer;font-family:inherit;font-size:12px}
.edit-card .btn-save:hover{background:#e69500}
.edit-card .btn-cancel{flex:1;padding:10px;background:#1a1a1a;border:1px solid rgba(255,255,255,.08);border-radius:6px;color:#aaa;font-weight:600;cursor:pointer;font-family:inherit;font-size:12px}
.edit-card .btn-cancel:hover{background:#222;color:#fff}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr} table{font-size:12px} th,td{padding:8px 10px}}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h2>🔒 Admin Panel</h2>
    <p>Login as Dynamox to access</p>
    <input type="text" id="adminUser" placeholder="Username" value="dynamox">
    <input type="password" id="adminPass" placeholder="Password">
    <button onclick="adminLogin()">Login</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="adminApp" style="display:none">
  <div class="top-bar">
    <h1><span>👑</span> Quro Admin <span class="badge">OWNER</span></h1>
    <button onclick="adminLogout()">Logout</button>
  </div>
  <div class="container">
    <div class="stats" id="statsRow"></div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('users',this)">Users</button>
      <button class="tab" onclick="switchTab('servers',this)">Servers</button>
      <button class="tab" onclick="switchTab('messages',this)">Messages</button>
      <button class="tab" onclick="switchTab('kicks',this)">Kicks</button>
    </div>
    <div id="tabContent"></div>
  </div>
</div>

<div class="edit-modal" id="editModal" onclick="if(event.target===this)closeEditModal()">
  <div class="edit-card" id="editCard"></div>
</div>

<script>
const SB_URL='https://eplikcdnwxhpsvjhxtup.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwbGlrY2Rud3hocHN2amh4dHVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDc0MDcsImV4cCI6MjA5MDA4MzQwN30.bpqgAIROtU8kKjl6W8UYjcZQ8LsQ24cB9ko8ze7JfMo';
const sb=supabase.createClient(SB_URL,SB_KEY);
const ADMIN_USER='dynamox';
var currentTab='users';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function adminLogin(){
  var user=document.getElementById('adminUser').value.trim().toLowerCase();
  var pass=document.getElementById('adminPass').value;
  var err=document.getElementById('loginErr');
  if(user!==ADMIN_USER){err.textContent='Access denied. Admin only.';return;}
  err.textContent='Logging in...';
  try{
    var res=await sb.auth.signInWithPassword({email:user+'@quro.local',password:pass});
    if(res.error)throw res.error;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminApp').style.display='block';
    loadDashboard();
  }catch(e){err.textContent=e.message||'Login failed';}
}

function adminLogout(){
  sb.auth.signOut();
  document.getElementById('adminApp').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('adminPass').value='';
}

async function loadDashboard(){
  // Stats
  var users=await sb.from('profiles').select('id',{count:'exact',head:true});
  var servers=await sb.from('servers').select('id',{count:'exact',head:true});
  var msgs=await sb.from('messages').select('id',{count:'exact',head:true});
  var kicks=await sb.from('server_kicks').select('id',{count:'exact',head:true});
  document.getElementById('statsRow').innerHTML=
    '<div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-val">'+(users.count||0)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Servers</div><div class="stat-val">'+(servers.count||0)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Messages</div><div class="stat-val">'+(msgs.count||0)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Kicks</div><div class="stat-val">'+(kicks.count||0)+'</div></div>';
  switchTab('users',document.querySelector('.tab.active'));
}

function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(btn)btn.classList.add('active');
  if(tab==='users')loadUsers();
  else if(tab==='servers')loadServers();
  else if(tab==='messages')loadMessages();
  else if(tab==='kicks')loadKicks();
}

async function loadUsers(search){
  var content=document.getElementById('tabContent');
  content.innerHTML='<input class="search-bar" placeholder="Search users..." oninput="loadUsers(this.value)" value="'+(search||'')+'">';
  var q=sb.from('profiles').select('id,username,avatar,photo,last_seen,about,nameplate,banner').order('username');
  if(search)q=q.ilike('username','%'+search+'%');
  var res=await q.limit(100);
  var users=res.data||[];
  var now=Date.now();
  content.innerHTML+='<section class="section"><h3>Users <span class="count">'+users.length+'</span></h3>';
  if(!users.length){content.innerHTML+='<div class="empty">No users found</div></section>';return;}
  content.innerHTML+='<table><tr><th>User</th><th>Status</th><th>Nameplate</th><th>About</th><th>Actions</th></tr>'+
    users.map(function(u){
      var diff=u.last_seen?now-new Date(u.last_seen).getTime():Infinity;
      var status=diff<90000?'on':diff<300000?'idle':'off';
      var isOwner=u.username&&u.username.toLowerCase()===ADMIN_USER;
      return '<tr><td><div class="user-row"><div class="user-av">'+(u.photo?'<img src="'+esc(u.photo)+'">':esc(u.avatar||u.username.charAt(0).toUpperCase()))+'</div><span>'+esc(u.username)+(isOwner?'<span class="owner-badge">👑 OWNER</span>':'')+'</span></div></td>'+
        '<td><span class="status-dot '+status+'"></span> '+(status==='on'?'Online':status==='idle'?'Idle':'Offline')+'</td>'+
        '<td style="color:#888;font-size:12px">'+esc(u.nameplate||'—')+'</td>'+
        '<td style="color:#666;font-size:12px;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(u.about||'—')+'</td>'+
        '<td><button class="action-btn" onclick="editUser(\''+u.id+'\')">Edit</button>'+(isOwner?'':'<button class="action-btn danger" onclick="deleteUser(\''+u.id+'\',\''+esc(u.username)+'\')">Delete</button>')+'</td></tr>';
    }).join('')+'</table></section>';
}

async function editUser(id){
  var res=await sb.from('profiles').select('*').eq('id',id).single();
  if(!res.data)return;
  var u=res.data;
  document.getElementById('editCard').innerHTML=
    '<h3>Edit User: '+esc(u.username)+'</h3>'+
    '<label>Username</label><input id="euName" value="'+esc(u.username)+'">'+
    '<label>Nameplate</label><input id="euPlate" value="'+esc(u.nameplate||'')+'">'+
    '<label>About</label><textarea id="euAbout">'+esc(u.about||'')+'</textarea>'+
    '<label>Avatar Letter</label><input id="euAvatar" value="'+esc(u.avatar||'')+'" maxlength="2">'+
    '<div class="btn-row"><button class="btn-save" onclick="saveEditUser(\''+id+'\')">Save</button><button class="btn-cancel" onclick="closeEditModal()">Cancel</button></div>';
  document.getElementById('editModal').classList.add('open');
}

async function saveEditUser(id){
  var name=document.getElementById('euName').value.trim();
  var plate=document.getElementById('euPlate').value.trim();
  var about=document.getElementById('euAbout').value.trim();
  var avatar=document.getElementById('euAvatar').value.trim();
  if(!name)return;
  await sb.from('profiles').update({username:name,nameplate:plate,about:about,avatar:avatar||name.charAt(0).toUpperCase()}).eq('id',id);
  closeEditModal();
  loadUsers();
}

async function deleteUser(id,name){
  if(!confirm('Delete user "'+name+'"? This removes their profile. Messages will remain.'))return;
  await sb.from('profiles').delete().eq('id',id);
  loadUsers();
}

async function loadServers(){
  var content=document.getElementById('tabContent');
  content.innerHTML='';
  var res=await sb.from('servers').select('id,name,description,owner_id,icon').order('name');
  var servers=res.data||[];
  // Get member counts
  var memberCounts={};
  for(var i=0;i<servers.length;i++){
    var mc=await sb.from('server_members').select('id',{count:'exact',head:true}).eq('server_id',servers[i].id);
    memberCounts[servers[i].id]=mc.count||0;
  }
  content.innerHTML='<section class="section"><h3>Servers <span class="count">'+servers.length+'</span></h3>';
  if(!servers.length){content.innerHTML+='<div class="empty">No servers yet</div></section>';return;}
  content.innerHTML+='<table><tr><th>Server</th><th>Description</th><th>Members</th><th>Actions</th></tr>'+
    servers.map(function(s){
      return '<tr><td><div class="user-row"><div class="user-av">'+(s.icon?'<img src="'+esc(s.icon)+'">':esc(s.name.charAt(0).toUpperCase()))+'</div><span>'+esc(s.name)+'</span></div></td>'+
        '<td style="color:#888;font-size:12px">'+esc(s.description||'—')+'</td>'+
        '<td>'+memberCounts[s.id]+'</td>'+
        '<td><button class="action-btn" onclick="editServer(\''+s.id+'\')">Edit</button><button class="action-btn danger" onclick="deleteServer(\''+s.id+'\',\''+esc(s.name)+'\')">Delete</button></td></tr>';
    }).join('')+'</table></section>';
}

async function editServer(id){
  var res=await sb.from('servers').select('*').eq('id',id).single();
  if(!res.data)return;
  var s=res.data;
  document.getElementById('editCard').innerHTML=
    '<h3>Edit Server: '+esc(s.name)+'</h3>'+
    '<label>Name</label><input id="esName" value="'+esc(s.name)+'">'+
    '<label>Description</label><textarea id="esDesc">'+esc(s.description||'')+'</textarea>'+
    '<div class="btn-row"><button class="btn-save" onclick="saveEditServer(\''+id+'\')">Save</button><button class="btn-cancel" onclick="closeEditModal()">Cancel</button></div>';
  document.getElementById('editModal').classList.add('open');
}

async function saveEditServer(id){
  var name=document.getElementById('esName').value.trim();
  var desc=document.getElementById('esDesc').value.trim();
  if(!name)return;
  await sb.from('servers').update({name:name,description:desc}).eq('id',id);
  closeEditModal();
  loadServers();
}

async function deleteServer(id,name){
  if(!confirm('DELETE server "'+name+'"? This removes all channels, members, and kicks. Cannot be undone!'))return;
  await sb.from('server_kicks').delete().eq('server_id',id);
  await sb.from('server_members').delete().eq('server_id',id);
  await sb.from('channels').delete().eq('server_id',id);
  await sb.from('servers').delete().eq('id',id);
  loadServers();
}

async function loadMessages(){
  var content=document.getElementById('tabContent');
  content.innerHTML='<input class="search-bar" placeholder="Search messages..." oninput="searchMessages(this.value)">';
  var res=await sb.from('messages').select('*').order('created_at',{ascending:false}).limit(50);
  renderMessages(res.data||[],content);
}

async function searchMessages(q){
  var content=document.getElementById('tabContent');
  if(!q){loadMessages();return;}
  var res=await sb.from('messages').select('*').ilike('text','%'+q+'%').order('created_at',{ascending:false}).limit(50);
  content.innerHTML='<input class="search-bar" placeholder="Search messages..." oninput="searchMessages(this.value)" value="'+esc(q)+'">';
  renderMessages(res.data||[],content);
}

function renderMessages(msgs,content){
  content.innerHTML+='<section class="section"><h3>Recent Messages <span class="count">'+msgs.length+'</span></h3>';
  if(!msgs.length){content.innerHTML+='<div class="empty">No messages</div></section>';return;}
  content.innerHTML+='<table><tr><th>Author</th><th>Message</th><th>Channel</th><th>Time</th><th>Actions</th></tr>'+
    msgs.map(function(m){
      var isOwner=m.author&&m.author.toLowerCase()===ADMIN_USER;
      return '<tr><td>'+esc(m.author)+(isOwner?'<span class="owner-badge">👑</span>':'')+'</td>'+
        '<td><div class="msg-preview">'+esc(m.text)+'</div></td>'+
        '<td style="font-size:11px;color:#666">'+esc(m.server_channel)+'</td>'+
        '<td style="font-size:11px;color:#666">'+esc(m.time)+'</td>'+
        '<td><button class="action-btn danger" onclick="deleteMessage(\''+m.id+'\')">Delete</button></td></tr>';
    }).join('')+'</table></section>';
}

async function deleteMessage(id){
  if(!confirm('Delete this message?'))return;
  await sb.from('messages').delete().eq('id',id);
  loadMessages();
}

async function loadKicks(){
  var content=document.getElementById('tabContent');
  content.innerHTML='';
  var res=await sb.from('server_kicks').select('id,server_id,user_id,kicked_by,created_at,servers(name)').order('created_at',{ascending:false});
  var kicks=res.data||[];
  // Resolve user names
  var userIds=new Set();
  kicks.forEach(function(k){userIds.add(k.user_id);userIds.add(k.kicked_by);});
  var userMap={};
  if(userIds.size){
    var ur=await sb.from('profiles').select('id,username').in('id',Array.from(userIds));
    (ur.data||[]).forEach(function(u){userMap[u.id]=u.username;});
  }
  content.innerHTML='<section class="section"><h3>Kicks <span class="count">'+kicks.length+'</span></h3>';
  if(!kicks.length){content.innerHTML+='<div class="empty">No kicks recorded</div></section>';return;}
  content.innerHTML+='<table><tr><th>User</th><th>Server</th><th>Kicked By</th><th>Date</th><th>Actions</th></tr>'+
    kicks.map(function(k){
      return '<tr><td>'+esc(userMap[k.user_id]||k.user_id)+'</td>'+
        '<td>'+esc(k.servers?k.servers.name:'—')+'</td>'+
        '<td>'+esc(userMap[k.kicked_by]||k.kicked_by)+'</td>'+
        '<td style="font-size:11px;color:#666">'+new Date(k.created_at).toLocaleDateString()+'</td>'+
        '<td><button class="action-btn" onclick="unkickUser(\''+k.id+'\')">Unkick</button></td></tr>';
    }).join('')+'</table></section>';
}

async function unkickUser(id){
  if(!confirm('Unkick this user? They will be able to rejoin.'))return;
  await sb.from('server_kicks').delete().eq('id',id);
  loadKicks();
}

function closeEditModal(){document.getElementById('editModal').classList.remove('open');}

// Auto-check session
(async function(){
  var s=await sb.auth.getSession();
  if(s.data.session){
    var prof=await sb.from('profiles').select('username').eq('id',s.data.session.user.id).single();
    if(prof.data&&prof.data.username.toLowerCase()===ADMIN_USER){
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('adminApp').style.display='block';
      loadDashboard();
    }
  }
})();
</script>
</body>
</html>
